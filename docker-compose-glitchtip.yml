version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: glitchtip-postgres
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - glitchtip-pg-data:/var/lib/postgresql/data
    ports:
      - "5438:5432" # Mapeado a un puerto no conflictivo con las bases de datos de la app
    networks:
      - glitchtip-net

  redis:
    image: redis:7-alpine
    container_name: glitchtip-redis
    networks:
      - glitchtip-net

  web:
    image: glitchtip/glitchtip
    container_name: glitchtip-web
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_URL: postgres://postgres:password@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: "secret-key-reemplazar-en-produccion-grupo-cordillera-logs"
      GLITCHTIP_DOMAIN: http://localhost:8000
      GLITCHTIP_ALLOW_SIGNUP: "true"
    volumes:
      - glitchtip-uploads:/code/uploads
    networks:
      - glitchtip-net

  worker:
    image: glitchtip/glitchtip
    container_name: glitchtip-worker
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: "secret-key-reemplazar-en-produccion-grupo-cordillera-logs"
    volumes:
      - glitchtip-uploads:/code/uploads
    networks:
      - glitchtip-net

volumes:
  glitchtip-pg-data:
  glitchtip-uploads:

networks:
  glitchtip-net:
    driver: bridge
