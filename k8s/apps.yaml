apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-service
  namespace: grupo-cordillera
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff-service
  template:
    metadata:
      labels:
        app: bff-service
    spec:
      containers:
        - name: bff-service
          image: grupo-cordillera-bff-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: AUTH_API_URL
              valueFrom:
                configMapKeyRef:
                  name: grupo-cordillera-config
                  key: AUTH_API_URL
            - name: KPIS_API_URL
              valueFrom:
                configMapKeyRef:
                  name: grupo-cordillera-config
                  key: KPIS_API_URL
            - name: USER_API_URL
              valueFrom:
                configMapKeyRef:
                  name: grupo-cordillera-config
                  key: USER_API_URL
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: grupo-cordillera-config
                  key: ALLOWED_ORIGINS
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bff-service
  namespace: grupo-cordillera
spec:
  selector:
    app: bff-service
  ports:
    - port: 8000
      targetPort: 8000
---
