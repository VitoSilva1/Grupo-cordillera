apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kpis-db-data
  namespace: grupo-cordillera
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpis-db
  namespace: grupo-cordillera
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kpis-db
  template:
    metadata:
      labels:
        app: kpis-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: grupo-cordillera-config
                  key: KPIS_DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: grupo-cordillera-config
                  key: KPIS_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grupo-cordillera-db-secret
                  key: KPIS_DB_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kpis_user", "-d", "kpis_db"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kpis-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: kpis-db
  namespace: grupo-cordillera
spec:
  selector:
    app: kpis-db
  ports:
    - port: 5432
      targetPort: 5432
---
