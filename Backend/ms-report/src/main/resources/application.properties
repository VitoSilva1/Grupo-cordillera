spring.application.name=report-service
server.port=8082

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/report_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:report_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:report_pass}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
