spring.application.name=user-service
server.port=8082

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/user_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:user_pass}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Sentry / GlitchTip Configuration
sentry.dsn=${GLITCHTIP_DSN:}
sentry.traces-sample-rate=1.0
