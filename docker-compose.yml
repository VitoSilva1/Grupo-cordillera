services:
  kpis-db:
    image: postgres:16
    container_name: grupo-cordillera-kpis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kpis_db
      POSTGRES_USER: kpis_user
      POSTGRES_PASSWORD: kpis_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpis_user -d kpis_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5434:5432"
    volumes:
      - kpis-db-data:/var/lib/postgresql/data

  user-db:
    image: postgres:16
    container_name: grupo-cordillera-user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5435:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data

  report-db:
    image: postgres:16
    container_name: grupo-cordillera-report-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: report_db
      POSTGRES_USER: report_user
      POSTGRES_PASSWORD: report_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U report_user -d report_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5436:5432"
    volumes:
      - report-db-data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./backend/ms-auth
    image: grupo-cordillera-auth-service:latest
    container_name: grupo-cordillera-auth
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: http://user-service:8082/api/users
    depends_on:
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/health >/dev/null 2>&1 || curl -fsS http://localhost:8080/api/auth/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "9080:8080"

  kpis-service:
    build:
      context: ./backend/ms-kpis
    image: grupo-cordillera-kpis-service:latest
    container_name: grupo-cordillera-kpis
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://kpis-db:5432/kpis_db
      SPRING_DATASOURCE_USERNAME: kpis_user
      SPRING_DATASOURCE_PASSWORD: kpis_pass
    depends_on:
      kpis-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/kpis/health >/dev/null 2>&1 || curl -fsS http://localhost:8081/api/kpis/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "9081:8081"

  user-service:
    build:
      context: ./backend/ms-user
    image: grupo-cordillera-user-service:latest
    container_name: grupo-cordillera-user
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: user_user
      SPRING_DATASOURCE_PASSWORD: user_pass
    depends_on:
      user-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/api/users/health >/dev/null 2>&1 || curl -fsS http://localhost:8082/api/users/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "9082:8082"

  report-service:
    build:
      context: ./backend/ms-report
    image: grupo-cordillera-report-service:latest
    container_name: grupo-cordillera-report
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://report-db:5432/report_db
      SPRING_DATASOURCE_USERNAME: report_user
      SPRING_DATASOURCE_PASSWORD: report_pass
    depends_on:
      report-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/api/reports/health >/dev/null 2>&1 || curl -fsS http://localhost:8082/api/reports/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "9083:8082"

  bff-service:
    build:
      context: ./backend/bff
    image: grupo-cordillera-bff-service:latest
    container_name: grupo-cordillera-bff
    restart: unless-stopped
    environment:
      PORT: 8000
      AUTH_API_URL: http://auth-service:8080/api/auth
      KPIS_API_URL: http://kpis-service:8081/api/kpis
      USER_API_URL: http://user-service:8082/api/users
      REPORT_API_URL: http://report-service:8082/api/reports
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      auth-service:
        condition: service_healthy
      kpis-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health >/dev/null 2>&1 || curl -fsS http://localhost:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8000:8000"

  api-gateway:
    build:
      context: ./backend/api-gateway
    image: grupo-cordillera-api-gateway:latest
    container_name: grupo-cordillera-api-gateway
    restart: unless-stopped
    depends_on:
      bff-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "8088:8088"

  front-web2:
    build:
      context: ./frontend
      args:
        VITE_USERS_API_URL: /api/auth
        VITE_USER_API_URL: /api/users
        VITE_KPIS_API_URL: /api/kpis
    image: grupo-cordillera-front-web2:latest
    container_name: grupo-cordillera-front
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  kpis-db-data:
  user-db-data:
  report-db-data:
