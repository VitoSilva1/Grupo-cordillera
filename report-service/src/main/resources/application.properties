spring.application.name=report-service
server.port=8082

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5436/reports_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:reports_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:reports_pass}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-on-validation-error=true
spring.flyway.clean-disabled=false
